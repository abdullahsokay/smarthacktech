<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" font-family="'Space Grotesk','Segoe UI',system-ui,sans-serif">
  <defs>
    <linearGradient id="rm-bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0e0c0a" /><stop offset="1" stop-color="#141009"/></linearGradient>
    <linearGradient id="rm-gold" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#E8C766"/><stop offset="1" stop-color="#D4AF37"/></linearGradient>
    <linearGradient id="rm-road" x1="0" y1="1" x2="0" y2="0"><stop offset="0" stop-color="#1a1c22"/><stop offset="1" stop-color="#0c0d11"/></linearGradient>
  </defs>
  <rect width="1200" height="750" fill="url(#rm-bg)"/>
  <text x="80" y="118" fill="#f5f3ee" font-size="52" font-weight="700">RoadMate</text>
  <text x="82" y="160" fill="#f59e0b" font-size="22" font-weight="600">Turn-by-turn, made for our roads</text>
  <g fill="#9a9aa3" font-size="20">
    <circle cx="92" cy="230" r="6" fill="#f59e0b"/><text x="112" y="237">Voice navigation in Urdu &amp; English</text>
    <circle cx="92" cy="280" r="6" fill="#f59e0b"/><text x="112" y="287">Live traffic &amp; hazard alerts</text>
    <circle cx="92" cy="330" r="6" fill="#f59e0b"/><text x="112" y="337">Offline maps for low-signal areas</text>
  </g>
  <!-- phone -->
  <g transform="translate(720,70)">
    <rect width="340" height="610" rx="46" fill="#1b1813" stroke="#ffffff" stroke-opacity=".08"/>
    <rect x="14" y="14" width="312" height="582" rx="34" fill="url(#rm-road)"/>
    <rect x="120" y="26" width="100" height="20" rx="10" fill="#0a0a0a"/>
    <!-- road perspective -->
    <path d="M120 596 L80 230 L260 230 L220 596 Z" fill="#22242c"/>
    <g stroke="#f59e0b" stroke-width="8" stroke-dasharray="22 20" stroke-linecap="round"><path d="M170 590 L170 240"/></g>
    <!-- turn banner -->
    <rect x="24" y="70" width="292" height="92" rx="20" fill="#17150f"/>
    <path d="M64 116 l26 -26 0 16 22 0 0 20 -22 0 0 16 z" fill="#f59e0b"/>
    <text x="130" y="108" fill="#f5f3ee" font-size="24" font-weight="700">300 m</text>
    <text x="130" y="138" fill="#9a9aa3" font-size="16">Turn left onto Mall Rd</text>
    <!-- position -->
    <circle cx="170" cy="470" r="14" fill="#f59e0b" stroke="#0c0d11" stroke-width="5"/>
    <path d="M170 456 l8 16 -16 0 z" fill="#fff"/>
    <!-- bottom eta -->
    <rect x="24" y="500" width="292" height="80" rx="22" fill="#17150f"/>
    <text x="48" y="534" fill="#f59e0b" font-size="30" font-weight="700">14 min</text>
    <text x="48" y="562" fill="#9a9aa3" font-size="16">6.2 km · arrive 4:38 PM</text>
    <rect x="248" y="520" width="48" height="48" rx="24" fill="url(#rm-gold)"/>
    <path d="M264 544 l10 0 m-5 -5 l5 5 -5 5" stroke="#0a0a0a" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
