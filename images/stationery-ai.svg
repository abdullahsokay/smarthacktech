<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" font-family="'Space Grotesk','Segoe UI',system-ui,sans-serif">
  <defs>
    <linearGradient id="st-bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0d0f06"/><stop offset="1" stop-color="#1a1707"/></linearGradient>
    <linearGradient id="st-am" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#F5B345"/><stop offset="1" stop-color="#C07A12"/></linearGradient>
  </defs>
  <rect width="1200" height="750" fill="url(#st-bg)"/>
  <!-- header -->
  <g transform="translate(70,60)">
    <rect width="46" height="46" rx="12" fill="#F5B345" fill-opacity=".16"/>
    <rect x="14" y="11" width="18" height="24" rx="3" fill="none" stroke="#F5B345" stroke-width="3"/>
    <path d="M14 20h18" stroke="#F5B345" stroke-width="3" stroke-linecap="round"/>
    <text x="62" y="22" fill="#faf6ee" font-size="30" font-weight="700">Stationery Detection</text>
    <text x="404" y="22" fill="#F5B345" font-size="30" font-weight="700">AI</text>
    <rect x="0" y="44" width="460" height="2" fill="#ffffff" fill-opacity=".06"/>
    <g transform="translate(880,0)">
      <rect width="180" height="40" rx="20" fill="#241d0c" stroke="#F5B345" stroke-opacity=".4"/>
      <circle cx="24" cy="20" r="6" fill="#5FB98A"/>
      <text x="42" y="26" fill="#f0e4cb" font-size="16" font-weight="600">LIVE · 24 FPS</text>
    </g>
  </g>
  <!-- detection canvas -->
  <g transform="translate(70,150)">
    <rect width="720" height="530" rx="22" fill="#120f06" stroke="#ffffff" stroke-opacity=".06"/>
    <rect x="20" y="20" width="680" height="490" rx="14" fill="#1b1608"/>
    <!-- desk surface -->
    <rect x="44" y="330" width="632" height="160" rx="10" fill="#2a2210"/>

    <!-- pencil -->
    <g transform="translate(120,150)">
      <rect x="18" y="30" width="26" height="150" rx="4" fill="#E0A72E"/>
      <path d="M18 180h26l-13 30z" fill="#f0dcc0"/>
      <path d="M24 200h14l-7 10z" fill="#241d0c"/>
      <rect x="18" y="10" width="26" height="20" rx="4" fill="#E6867E"/>
    </g>
    <rect x="126" y="146" width="60" height="220" rx="8" fill="none" stroke="#F5B345" stroke-width="3"/>
    <rect x="126" y="120" width="118" height="26" rx="5" fill="#F5B345"/><text x="136" y="139" fill="#2b1c02" font-size="15" font-weight="700">pencil 0.98</text>

    <!-- ruler -->
    <g transform="translate(250,300)">
      <rect x="0" y="0" width="230" height="42" rx="5" fill="#6FD7C4" fill-opacity=".85"/>
      <g stroke="#0d2b25" stroke-width="3">
        <path d="M20 0v14M50 0v20M80 0v14M110 0v20M140 0v14M170 0v20M200 0v14"/>
      </g>
    </g>
    <rect x="244" y="294" width="242" height="54" rx="8" fill="none" stroke="#6FD7C4" stroke-width="3"/>
    <rect x="244" y="268" width="112" height="26" rx="5" fill="#6FD7C4"/><text x="254" y="287" fill="#062822" font-size="15" font-weight="700">ruler 0.95</text>

    <!-- notebook -->
    <g transform="translate(430,120)">
      <rect x="0" y="0" width="150" height="196" rx="8" fill="#f0ece0"/>
      <rect x="0" y="0" width="26" height="196" rx="8" fill="#C07A12"/>
      <g stroke="#c9c2ae" stroke-width="3">
        <path d="M46 46h86M46 78h86M46 110h86M46 142h60"/>
      </g>
    </g>
    <rect x="424" y="114" width="162" height="208" rx="8" fill="none" stroke="#F5B345" stroke-width="3"/>
    <rect x="424" y="88" width="146" height="26" rx="5" fill="#F5B345"/><text x="434" y="107" fill="#2b1c02" font-size="15" font-weight="700">notebook 0.97</text>

    <!-- eraser -->
    <g transform="translate(596,372)">
      <rect x="0" y="0" width="70" height="40" rx="7" fill="#E6867E"/>
      <rect x="0" y="22" width="70" height="18" rx="6" fill="#c96b63"/>
    </g>
    <rect x="590" y="366" width="82" height="52" rx="8" fill="none" stroke="#E6867E" stroke-width="3"/>
    <rect x="590" y="340" width="124" height="26" rx="5" fill="#E6867E"/><text x="600" y="359" fill="#2a0c08" font-size="15" font-weight="700">eraser 0.91</text>

    <!-- scan sweep -->
    <rect x="20" y="252" width="680" height="2" fill="#F5B345" fill-opacity=".35"/>
  </g>
  <!-- side panel -->
  <g transform="translate(820,150)">
    <rect width="310" height="530" rx="22" fill="#120f06" stroke="#ffffff" stroke-opacity=".06"/>
    <text x="28" y="54" fill="#f2e8d6" font-size="20" font-weight="600">Detected Objects</text>
    <text x="28" y="84" fill="#c4ab7e" font-size="15">4 items · 28 ms · live</text>
    <g font-size="17">
      <rect x="24" y="108" width="262" height="58" rx="12" fill="#1b1608"/><circle cx="48" cy="137" r="7" fill="#F5B345"/><text x="68" y="143" fill="#faf6ee">Pencil</text><text x="262" y="143" fill="#F5B345" text-anchor="end">0.98</text>
      <rect x="24" y="178" width="262" height="58" rx="12" fill="#1b1608"/><circle cx="48" cy="207" r="7" fill="#F5B345"/><text x="68" y="213" fill="#faf6ee">Notebook</text><text x="262" y="213" fill="#F5B345" text-anchor="end">0.97</text>
      <rect x="24" y="248" width="262" height="58" rx="12" fill="#1b1608"/><circle cx="48" cy="277" r="7" fill="#6FD7C4"/><text x="68" y="283" fill="#faf6ee">Ruler</text><text x="262" y="283" fill="#6FD7C4" text-anchor="end">0.95</text>
      <rect x="24" y="318" width="262" height="58" rx="12" fill="#1b1608"/><circle cx="48" cy="347" r="7" fill="#E6867E"/><text x="68" y="353" fill="#faf6ee">Eraser</text><text x="262" y="353" fill="#E6867E" text-anchor="end">0.91</text>
    </g>
    <!-- summary card -->
    <g transform="translate(24,404)">
      <rect width="262" height="92" rx="14" fill="url(#st-am)" fill-opacity=".14" stroke="#F5B345" stroke-opacity=".45"/>
      <text x="18" y="34" fill="#F5B345" font-size="15" font-weight="700">REAL-TIME INFERENCE</text>
      <text x="18" y="60" fill="#f2e8d6" font-size="15">4 of 4 items classified</text>
      <text x="18" y="80" fill="#c4ab7e" font-size="13">mean confidence · 0.95</text>
    </g>
  </g>
</svg>
