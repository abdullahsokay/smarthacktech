<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" font-family="'Space Grotesk','Segoe UI',system-ui,sans-serif">
  <defs>
    <linearGradient id="st-bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0d0c11"/><stop offset="1" stop-color="#120e16"/></linearGradient>
    <linearGradient id="st-gold" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#E8C766"/><stop offset="1" stop-color="#D4AF37"/></linearGradient>
  </defs>
  <rect width="1200" height="750" fill="url(#st-bg)"/>
  <!-- header -->
  <g transform="translate(70,60)">
    <rect width="46" height="46" rx="12" fill="#e879f9" fill-opacity=".16"/>
    <path d="M14 32 l8 -10 6 7 5 -6 7 9z" fill="#e879f9"/><circle cx="18" cy="16" r="4" fill="#e879f9"/>
    <text x="62" y="22" fill="#f5f3ee" font-size="30" font-weight="700">Stationery Detection</text>
    <text x="406" y="22" fill="#e879f9" font-size="30" font-weight="700">AI</text>
    <rect x="0" y="44" width="470" height="2" fill="#ffffff" fill-opacity=".06"/>
  </g>
  <!-- detection canvas -->
  <g transform="translate(70,150)">
    <rect width="720" height="530" rx="22" fill="#100f14" stroke="#ffffff" stroke-opacity=".06"/>
    <!-- desk surface -->
    <rect x="20" y="20" width="680" height="490" rx="14" fill="#16151b"/>
    <!-- notebook -->
    <g><rect x="70" y="120" width="220" height="280" rx="10" fill="#2b2740"/><rect x="70" y="120" width="26" height="280" fill="#3a3458"/><line x1="120" y1="170" x2="260" y2="170" stroke="#52506a" stroke-width="5"/><line x1="120" y1="210" x2="260" y2="210" stroke="#52506a" stroke-width="5"/><line x1="120" y1="250" x2="240" y2="250" stroke="#52506a" stroke-width="5"/></g>
    <rect x="58" y="108" width="244" height="304" rx="8" fill="none" stroke="#22d3ee" stroke-width="3"/>
    <rect x="58" y="84" width="118" height="24" rx="5" fill="#22d3ee"/><text x="68" y="102" fill="#04222a" font-size="14" font-weight="700">notebook 0.98</text>
    <!-- pen -->
    <g transform="rotate(28 470 260)"><rect x="420" y="150" width="22" height="230" rx="11" fill="#D4AF37"/><path d="M420 150 l11 -26 11 26z" fill="#f3e3a6"/><rect x="420" y="356" width="22" height="24" rx="6" fill="#0a0a0a"/></g>
    <rect x="430" y="150" width="150" height="250" rx="8" fill="none" stroke="#34d399" stroke-width="3"/>
    <rect x="430" y="126" width="74" height="24" rx="5" fill="#34d399"/><text x="440" y="144" fill="#053024" font-size="14" font-weight="700">pen 0.95</text>
    <!-- eraser -->
    <g><rect x="470" y="430" width="120" height="50" rx="8" fill="#e879f9" fill-opacity=".5"/></g>
    <rect x="462" y="420" width="138" height="70" rx="8" fill="none" stroke="#f59e0b" stroke-width="3"/>
    <rect x="462" y="396" width="92" height="24" rx="5" fill="#f59e0b"/><text x="472" y="414" fill="#2a1c02" font-size="14" font-weight="700">eraser 0.91</text>
  </g>
  <!-- side panel -->
  <g transform="translate(820,150)">
    <rect width="310" height="530" rx="22" fill="#100f14" stroke="#ffffff" stroke-opacity=".06"/>
    <text x="28" y="54" fill="#cfcfd6" font-size="20" font-weight="600">Detections</text>
    <text x="28" y="84" fill="#9a9aa3" font-size="15">3 objects · 48 ms</text>
    <g font-size="17">
      <rect x="24" y="108" width="262" height="58" rx="12" fill="#16151b"/><circle cx="48" cy="137" r="7" fill="#22d3ee"/><text x="68" y="143" fill="#f5f3ee">notebook</text><text x="262" y="143" fill="#22d3ee" text-anchor="end">98%</text>
      <rect x="24" y="178" width="262" height="58" rx="12" fill="#16151b"/><circle cx="48" cy="207" r="7" fill="#34d399"/><text x="68" y="213" fill="#f5f3ee">pen</text><text x="262" y="213" fill="#34d399" text-anchor="end">95%</text>
      <rect x="24" y="248" width="262" height="58" rx="12" fill="#16151b"/><circle cx="48" cy="277" r="7" fill="#f59e0b"/><text x="68" y="283" fill="#f5f3ee">eraser</text><text x="262" y="283" fill="#f59e0b" text-anchor="end">91%</text>
    </g>
    <rect x="24" y="430" width="262" height="48" rx="24" fill="url(#st-gold)"/>
    <text x="155" y="460" fill="#0a0a0a" font-size="17" font-weight="700" text-anchor="middle">Run detection</text>
  </g>
</svg>
