<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" font-family="'Space Grotesk','Segoe UI',system-ui,sans-serif">
  <defs>
    <linearGradient id="dm-bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#061019"/><stop offset="1" stop-color="#0a1a26"/></linearGradient>
    <linearGradient id="dm-az" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#2FA8EF"/><stop offset="1" stop-color="#0F6FB0"/></linearGradient>
  </defs>
  <rect width="1200" height="750" fill="url(#dm-bg)"/>
  <!-- header -->
  <g transform="translate(70,60)">
    <rect width="46" height="46" rx="12" fill="#2FA8EF" fill-opacity=".16"/>
    <circle cx="23" cy="20" r="8" fill="none" stroke="#2FA8EF" stroke-width="3"/>
    <path d="M9 38c3-8 25-8 28 0" fill="none" stroke="#2FA8EF" stroke-width="3" stroke-linecap="round"/>
    <text x="62" y="22" fill="#f0f6fb" font-size="30" font-weight="700">Driver Monitoring</text>
    <text x="336" y="22" fill="#2FA8EF" font-size="30" font-weight="700">AI</text>
    <rect x="0" y="44" width="400" height="2" fill="#ffffff" fill-opacity=".06"/>
    <g transform="translate(880,0)">
      <rect width="180" height="40" rx="20" fill="#0c2231" stroke="#2FA8EF" stroke-opacity=".4"/>
      <circle cx="24" cy="20" r="6" fill="#5FB98A"/>
      <text x="42" y="26" fill="#cfe4f4" font-size="16" font-weight="600">LIVE · CAM 1</text>
    </g>
  </g>
  <!-- camera canvas -->
  <g transform="translate(70,150)">
    <rect width="720" height="530" rx="22" fill="#08141d" stroke="#ffffff" stroke-opacity=".06"/>
    <rect x="20" y="20" width="680" height="490" rx="14" fill="#0d1d2a"/>
    <!-- cabin window hint -->
    <rect x="44" y="44" width="632" height="180" rx="10" fill="#12293a"/>
    <!-- driver: head + torso + belt -->
    <g>
      <circle cx="360" cy="220" r="74" fill="#1c3a52"/>
      <path d="M360 146a74 74 0 0 1 74 74c0 22-8 40-20 54h-108c-12-14-20-32-20-54a74 74 0 0 1 74-74z" fill="#24475f"/>
      <circle cx="332" cy="212" r="9" fill="#0a1622"/><circle cx="388" cy="212" r="9" fill="#0a1622"/>
      <path d="M334 254c14 10 38 10 52 0" stroke="#0a1622" stroke-width="6" fill="none" stroke-linecap="round"/>
      <path d="M240 470c8-96 68-140 120-140s112 44 120 140z" fill="#1c3a52"/>
      <path d="M268 344 L452 452" stroke="#F5A100" stroke-width="18" stroke-linecap="round"/>
    </g>
    <!-- face detection box -->
    <rect x="272" y="132" width="176" height="176" rx="10" fill="none" stroke="#2FA8EF" stroke-width="3"/>
    <rect x="272" y="106" width="120" height="26" rx="5" fill="#2FA8EF"/><text x="282" y="125" fill="#04202f" font-size="15" font-weight="700">face 0.99</text>
    <!-- eye tracker ticks -->
    <path d="M318 212h28M374 212h28" stroke="#6FD7C4" stroke-width="3"/>
    <!-- phone detection -->
    <g><rect x="510" y="330" width="66" height="112" rx="10" fill="#0a1622" stroke="#33546d" stroke-width="3"/><rect x="522" y="346" width="42" height="70" rx="4" fill="#16354c"/></g>
    <rect x="498" y="318" width="90" height="136" rx="8" fill="none" stroke="#E6867E" stroke-width="3"/>
    <rect x="498" y="292" width="102" height="26" rx="5" fill="#E6867E"/><text x="508" y="311" fill="#2a0c08" font-size="15" font-weight="700">phone 0.94</text>
    <!-- seatbelt tag -->
    <rect x="188" y="392" width="112" height="26" rx="5" fill="#5FB98A"/><text x="198" y="411" fill="#06281a" font-size="15" font-weight="700">seatbelt ON</text>
  </g>
  <!-- side panel -->
  <g transform="translate(820,150)">
    <rect width="310" height="530" rx="22" fill="#08141d" stroke="#ffffff" stroke-opacity=".06"/>
    <text x="28" y="54" fill="#d8e7f2" font-size="20" font-weight="600">Behavior Monitor</text>
    <text x="28" y="84" fill="#8fb0c4" font-size="15">4 checks · 31 ms · live</text>
    <g font-size="17">
      <rect x="24" y="108" width="262" height="58" rx="12" fill="#0d1d2a"/><circle cx="48" cy="137" r="7" fill="#5FB98A"/><text x="68" y="143" fill="#f0f6fb">Drowsiness</text><text x="262" y="143" fill="#5FB98A" text-anchor="end">OK</text>
      <rect x="24" y="178" width="262" height="58" rx="12" fill="#0d1d2a"/><circle cx="48" cy="207" r="7" fill="#5FB98A"/><text x="68" y="213" fill="#f0f6fb">Attention</text><text x="262" y="213" fill="#5FB98A" text-anchor="end">OK</text>
      <rect x="24" y="248" width="262" height="58" rx="12" fill="#2a1512" stroke="#E6867E" stroke-opacity=".5"/><circle cx="48" cy="277" r="7" fill="#E6867E"/><text x="68" y="283" fill="#f0f6fb">Phone usage</text><text x="262" y="283" fill="#E6867E" text-anchor="end">ALERT</text>
      <rect x="24" y="318" width="262" height="58" rx="12" fill="#0d1d2a"/><circle cx="48" cy="347" r="7" fill="#5FB98A"/><text x="68" y="353" fill="#f0f6fb">Seatbelt</text><text x="262" y="353" fill="#5FB98A" text-anchor="end">ON</text>
    </g>
    <!-- alert card -->
    <g transform="translate(24,404)">
      <rect width="262" height="92" rx="14" fill="url(#dm-az)" fill-opacity=".14" stroke="#2FA8EF" stroke-opacity=".45"/>
      <text x="18" y="34" fill="#2FA8EF" font-size="15" font-weight="700">⚠ INSTANT ALERT</text>
      <text x="18" y="60" fill="#d8e7f2" font-size="15">Mobile phone detected</text>
      <text x="18" y="80" fill="#8fb0c4" font-size="13">Driver notified · event logged</text>
    </g>
  </g>
</svg>
