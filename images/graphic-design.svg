<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" font-family="'Space Grotesk','Segoe UI',system-ui,sans-serif">
  <defs>
    <linearGradient id="gd-bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0d0c11"/><stop offset="1" stop-color="#100d14"/></linearGradient>
    <linearGradient id="gd-gold" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#E8C766"/><stop offset="1" stop-color="#D4AF37"/></linearGradient>
    <linearGradient id="gd-poster" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#a78bfa"/><stop offset="1" stop-color="#6d28d9"/></linearGradient>
    <linearGradient id="gd-grad2" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#f472b6"/><stop offset="1" stop-color="#fb7185"/></linearGradient>
  </defs>
  <rect width="1200" height="750" fill="#070608"/>
  <g transform="translate(70,70)">
    <rect width="1060" height="610" rx="20" fill="url(#gd-bg)" stroke="#ffffff" stroke-opacity=".08"/>
    <!-- top toolbar -->
    <path d="M0 20a20 20 0 0 1 20-20h1020a20 20 0 0 1 20 20v34H0z" fill="#16151b"/>
    <g transform="translate(24,16)"><rect width="22" height="22" rx="6" fill="#a78bfa"/><circle cx="44" cy="11" r="9" fill="none" stroke="#9a9aa3" stroke-width="2"/><rect x="72" y="2" width="18" height="18" fill="none" stroke="#9a9aa3" stroke-width="2"/><text x="110" y="17" fill="#cfcfd6" font-size="15">Aa</text></g>
    <text x="470" y="33" fill="#cfcfd6" font-size="16" font-weight="600">HackTech — Brand Kit</text>
    <text x="930" y="33" fill="#a78bfa" font-size="15">Figma · Canva</text>
    <!-- left layers panel -->
    <rect x="0" y="54" width="180" height="556" fill="#0e0d12"/>
    <text x="24" y="92" fill="#9a9aa3" font-size="14" font-weight="600">LAYERS</text>
    <g font-size="15" fill="#cfcfd6">
      <rect x="14" y="106" width="152" height="34" rx="8" fill="#a78bfa" fill-opacity=".16"/><text x="32" y="128" fill="#c4b5fd">Hero poster</text>
      <text x="32" y="170">Logo mark</text><text x="32" y="206">Headline</text><text x="32" y="242">Gradient bg</text><text x="32" y="278">Shapes</text>
    </g>
    <!-- canvas -->
    <rect x="180" y="54" width="700" height="556" fill="#08070a"/>
    <g transform="translate(250,120)">
      <rect width="560" height="430" rx="18" fill="url(#gd-poster)"/>
      <circle cx="430" cy="120" r="90" fill="url(#gd-grad2)" fill-opacity=".85"/>
      <rect x="40" y="60" width="46" height="46" rx="12" fill="#0a0a0a"/><path d="M63 72l12 7v14l-12 7-12-7V79z" fill="none" stroke="#D4AF37" stroke-width="3" stroke-linejoin="round"/>
      <text x="40" y="220" fill="#0a0a0a" font-size="52" font-weight="700">Design</text>
      <text x="40" y="280" fill="#ffffff" font-size="52" font-weight="700">that ships.</text>
      <rect x="40" y="320" width="180" height="50" rx="25" fill="#0a0a0a"/><text x="130" y="352" fill="#fff" font-size="18" text-anchor="middle">View brand kit</text>
      <!-- selection handles -->
      <rect x="-6" y="-6" width="572" height="442" rx="20" fill="none" stroke="#a78bfa" stroke-width="2"/>
      <g fill="#a78bfa"><rect x="-12" y="-12" width="12" height="12"/><rect x="560" y="-12" width="12" height="12"/><rect x="-12" y="430" width="12" height="12"/><rect x="560" y="430" width="12" height="12"/></g>
    </g>
    <!-- right properties / swatches -->
    <rect x="880" y="54" width="180" height="556" fill="#0e0d12"/>
    <text x="904" y="92" fill="#9a9aa3" font-size="14" font-weight="600">PALETTE</text>
    <g>
      <rect x="904" y="106" width="40" height="40" rx="10" fill="#D4AF37"/><rect x="954" y="106" width="40" height="40" rx="10" fill="#0a0a0a" stroke="#333" stroke-width="1"/><rect x="1004" y="106" width="40" height="40" rx="10" fill="#a78bfa"/>
      <rect x="904" y="156" width="40" height="40" rx="10" fill="#f472b6"/><rect x="954" y="156" width="40" height="40" rx="10" fill="#34d399"/><rect x="1004" y="156" width="40" height="40" rx="10" fill="#f5f3ee"/>
    </g>
    <text x="904" y="240" fill="#9a9aa3" font-size="14" font-weight="600">TYPE</text>
    <text x="904" y="276" fill="#f5f3ee" font-size="24" font-weight="700">Space Grotesk</text>
    <text x="904" y="306" fill="#9a9aa3" font-size="16">Inter · Regular</text>
    <rect x="904" y="544" width="132" height="46" rx="23" fill="url(#gd-gold)"/>
    <text x="970" y="573" fill="#0a0a0a" font-size="16" font-weight="700" text-anchor="middle">Export</text>
