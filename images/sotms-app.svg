<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" font-family="'Space Grotesk','Segoe UI',system-ui,sans-serif">
  <defs>
    <linearGradient id="sa-bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0b0e10"/><stop offset="1" stop-color="#0e1416"/></linearGradient>
    <linearGradient id="sa-gold" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#E8C766"/><stop offset="1" stop-color="#D4AF37"/></linearGradient>
  </defs>
  <rect width="1200" height="750" fill="url(#sa-bg)"/>
  <text x="80" y="118" fill="#f5f3ee" font-size="52" font-weight="700">SOTMS <tspan fill="#22d3ee">App</tspan></text>
  <text x="82" y="160" fill="#9a9aa3" font-size="22">Fleet command in your pocket</text>
  <g fill="#9a9aa3" font-size="20">
    <circle cx="92" cy="230" r="6" fill="#22d3ee"/><text x="112" y="237">Live GPS for every vehicle</text>
    <circle cx="92" cy="280" r="6" fill="#22d3ee"/><text x="112" y="287">Speed, fuel &amp; engine alerts</text>
    <circle cx="92" cy="330" r="6" fill="#22d3ee"/><text x="112" y="337">Trip history &amp; geo-fences</text>
  </g>
  <!-- phone -->
  <g transform="translate(720,70)">
    <rect width="340" height="610" rx="46" fill="#181b1d" stroke="#ffffff" stroke-opacity=".08"/>
    <rect x="14" y="14" width="312" height="582" rx="34" fill="#0c1012"/>
    <rect x="120" y="26" width="100" height="20" rx="10" fill="#0a0a0a"/>
    <!-- header -->
    <text x="40" y="84" fill="#f5f3ee" font-size="22" font-weight="700">My Fleet</text>
    <circle cx="296" cy="76" r="6" fill="#22d3ee"/>
    <!-- map area -->
    <rect x="24" y="104" width="292" height="220" rx="18" fill="#11181b"/>
    <g stroke="#22d3ee" stroke-opacity=".12" stroke-width="4" fill="none"><path d="M24 180 H316"/><path d="M24 250 H316"/><path d="M130 104 V324"/><path d="M230 104 V324"/></g>
    <g fill="#22d3ee"><circle cx="110" cy="170" r="8"/><circle cx="210" cy="240" r="8"/><circle cx="260" cy="150" r="8"/></g>
    <circle cx="160" cy="210" r="9" fill="#D4AF37"/>
    <!-- stat tiles -->
    <g>
      <rect x="24" y="340" width="140" height="92" rx="16" fill="#11181b"/>
      <text x="42" y="372" fill="#9a9aa3" font-size="15">Active</text>
      <text x="42" y="412" fill="#22d3ee" font-size="34" font-weight="700">18</text>
      <rect x="176" y="340" width="140" height="92" rx="16" fill="#11181b"/>
      <text x="194" y="372" fill="#9a9aa3" font-size="15">Avg speed</text>
      <text x="194" y="412" fill="#f5f3ee" font-size="34" font-weight="700">52<tspan font-size="16" fill="#9a9aa3"> km/h</tspan></text>
    </g>
    <!-- list -->
    <g>
      <rect x="24" y="448" width="292" height="56" rx="14" fill="#11181b"/>
      <circle cx="52" cy="476" r="8" fill="#22d3ee"/><text x="74" y="482" fill="#f5f3ee" font-size="17">LEH-1042 · moving</text>
      <rect x="24" y="512" width="292" height="56" rx="14" fill="#11181b"/>
      <circle cx="52" cy="540" r="8" fill="#D4AF37"/><text x="74" y="546" fill="#f5f3ee" font-size="17">LEH-3387 · idle</text>
    </g>
  </g>
</svg>
