<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" role="img" aria-label="Atif Riaz avatar">
  <defs>
    <linearGradient id="ar-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#052939"/>
      <stop offset="1" stop-color="#021826"/>
    </linearGradient>
    <radialGradient id="ar-glow" cx="0.32" cy="0.18" r="0.85">
      <stop offset="0" stop-color="#2FA8EF" stop-opacity=".28"/>
      <stop offset="1" stop-color="#2FA8EF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ar-fig" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#A6D6F7"/>
      <stop offset="1" stop-color="#2FA8EF"/>
    </linearGradient>
    <linearGradient id="ar-ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#A6D6F7" stop-opacity=".9"/>
      <stop offset="55%" stop-color="#2FA8EF" stop-opacity=".45"/>
      <stop offset="1" stop-color="#0F6FB0" stop-opacity=".15"/>
    </linearGradient>
    <clipPath id="ar-clip"><circle cx="400" cy="500" r="215"/></clipPath>
  </defs>

  <rect width="800" height="1000" fill="url(#ar-bg)"/>
  <rect width="800" height="1000" fill="url(#ar-glow)"/>

  <!-- faint circuit ticks, echoing the IoT motif used elsewhere on the site -->
  <g stroke="#2FA8EF" stroke-opacity=".14" stroke-width="2" fill="none">
    <path d="M70 210h120v-70M730 210H610v-70M70 790h120v70M730 790H610v70"/>
    <circle cx="190" cy="140" r="5" fill="#2FA8EF" fill-opacity=".3" stroke="none"/>
    <circle cx="610" cy="140" r="5" fill="#2FA8EF" fill-opacity=".3" stroke="none"/>
    <circle cx="190" cy="860" r="5" fill="#2FA8EF" fill-opacity=".3" stroke="none"/>
    <circle cx="610" cy="860" r="5" fill="#2FA8EF" fill-opacity=".3" stroke="none"/>
  </g>

  <!-- avatar disc -->
  <circle cx="400" cy="500" r="215" fill="#0C3E58" fill-opacity=".55"/>
  <g clip-path="url(#ar-clip)">
    <circle cx="400" cy="428" r="86" fill="url(#ar-fig)"/>
    <path d="M400 542c103 0 187 76 199 176v42H201v-42c12-100 96-176 199-176z" fill="url(#ar-fig)"/>
  </g>
  <circle cx="400" cy="500" r="215" fill="none" stroke="url(#ar-ring)" stroke-width="3"/>
  <circle cx="400" cy="500" r="238" fill="none" stroke="#2FA8EF" stroke-opacity=".16" stroke-width="1.5"/>
</svg>
